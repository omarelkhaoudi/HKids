<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ef3f61" />
    <title>Le Lit Qui Lit - Hors connexion</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f7f3ea;
        color: #171717;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(420px, calc(100vw - 32px));
        border-radius: 24px;
        background: #fff;
        padding: 32px;
        box-shadow: 0 16px 40px rgba(23, 23, 23, 0.12);
        text-align: center;
      }
      img {
        width: 72px;
        height: 72px;
        border-radius: 20px;
        object-fit: cover;
      }
      h1 {
        margin: 20px 0 8px;
        font-size: 28px;
      }
      p {
        margin: 0;
        color: #57534e;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/HKidsimg.webp" alt="HKids" />
      <h1>Mode hors connexion</h1>
      <p>Les contenus deja telecharges restent disponibles. Reconnecte-toi pour charger de nouvelles histoires.</p>
    </main>
  </body>
</html>
