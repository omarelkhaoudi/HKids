name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci
      - name: Run backend unit and integration tests
        working-directory: backend
        env:
          NODE_ENV: test
          SKIP_SERVER_START: '1'
        run: npm test
      - name: Audit backend production dependencies
        working-directory: backend
        run: npm audit --omit=dev --audit-level=high

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Install root lint/typecheck dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Run frontend unit tests
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:3000
        run: npm test
      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: https://hkids.example.com
        run: npm run build
      - name: Audit frontend production dependencies
        working-directory: frontend
        run: npm audit --omit=dev --audit-level=high

  e2e:
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run E2E smoke tests
        env:
          CI: true
          VITE_API_URL: https://hkids.example.com
        run: npm run test:e2e
