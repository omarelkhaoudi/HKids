name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci
      - name: Run backend unit and integration tests
        working-directory: backend
        env:
          NODE_ENV: test
          SKIP_SERVER_START: '1'
        run: npm test
      - name: Audit backend production dependencies
        working-directory: backend
        run: npm audit --omit=dev --audit-level=high

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Install root lint/typecheck dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Run frontend unit tests
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:3000
        run: npm test
      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: https://hkids.example.com
        run: npm run build
      - name: Audit frontend production dependencies
        working-directory: frontend
        run: npm audit --omit=dev --audit-level=high

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hkids
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json
      - name: Install root dependencies
        run: npm ci
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run E2E tests with backend
        env:
          CI: true
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hkids
          JWT_SECRET: hkids-test-jwt-secret-with-32-characters-minimum
          VITE_API_URL: http://localhost:3000
        run: npm run test:e2e
